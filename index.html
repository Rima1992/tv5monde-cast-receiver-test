<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>TV5Monde+ Cast Receiver</title>

  <!-- 1. SDK Google CAF (obligatoire, doit être en premier) -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <!-- 2. SDK Bitmovin CAF Receiver (obligatoire pour utiliser bitmovin.player.cast.Receiver) -->
  <script src="https://cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>


  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: sans-serif;
           overflow: hidden; width: 100vw; height: 100vh; }
    cast-media-player {
      width: 100%; height: 100%; display: block;
      --theme-hue: 0; --progress-color: #e50000; --splash-image: none;
    }
  </style>
</head>
<body>
  <cast-media-player></cast-media-player>
  <script src="receiver.js"></script>
</body>
</html>
