<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TV5Monde+ Bitmovin CAF Receiver</title>

  <!--
    ┌──────────────────────────────────────────────────────────────────────────────┐
    │  TV5Monde+ — Custom Bitmovin CAF Receiver                                   │
    │                                                                              │
    │  Ce receiver est déployé sur HTTPS et enregistré dans la                    │
    │  Google Cast SDK Developer Console avec un App ID unique.                   │
    │                                                                              │
    │  Ne pas oublier de :                                                         │
    │   1. Remplacer __BITMOVIN_LICENSE_KEY__ dans receiver.js au build           │
    │   2. Mettre à jour l'App ID dans strings.xml (fuzyo-player-sdk)             │
    │   3. Déployer sur un domaine HTTPS whitelisté Cast                          │
    └──────────────────────────────────────────────────────────────────────────────┘
  -->

  <!--
    1. Cast Receiver Framework — obligatoire, chargé en premier.
       Version 3 = CAF (Cast Application Framework).
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <!--
    2. Bitmovin Player pour le receiver CAF.
       La clé de licence est injectée dans receiver.js (playerConfig.key).
       Cette version doit correspondre à celle utilisée côté Android.
       Vérifier la dernière version sur : https://cdn.bitmovin.com/player/web/
  -->
  <script src="https://cdn.bitmovin.com/player/web/3/bitmovinplayer.js"></script>

  <!--
    3. Bitmovin CAF Receiver integration.
       Nécessaire pour que bitmovin.player.cast.Receiver soit disponible.
  -->
  <script src="https://cdn.bitmovin.com/player/web/3/bitmovinplayer-cast.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'TV5Monde', sans-serif;
      overflow: hidden;
    }

    /* Container principal du player — plein écran */
    #player-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Overlay de debug — affiché uniquement en mode dev (contrôlé par receiver.ts) */
    #debug-overlay {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #00ff00;
      font-family: monospace;
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      z-index: 9999;
      max-width: 400px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <!-- Container où Bitmovin injecte le player vidéo -->
  <div id="player-container"></div>

  <!-- Overlay debug (optionnel) -->
  <div id="debug-overlay"></div>

  <!--
    4. Notre receiver custom bundlé par webpack.
       receiver.ts → dist/receiver.js (généré par `npm run build`).
  -->
  <script src="receiver.js"></script>

</body>
</html>
