<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>TV5Monde+ Cast Receiver</title>

  <!--
    CAFv3 : seul le Cast Receiver Framework de Google est nécessaire côté receiver.
    Bitmovin Player NE TOURNE PAS sur le Chromecast — il tourne uniquement
    côté sender (Android / iOS). Le receiver utilise le player natif CAFv3 (Shaka).

    Ref : https://developer.bitmovin.com/playback/docs/caf-support
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /*
      cast-media-player est le composant Web officiel Google CAFv3.
      Il gère l'affichage vidéo, les contrôles, et le splashscreen automatiquement.
    */
    cast-media-player {
      width: 100%;
      height: 100%;
      display: block;
      --theme-hue: 0;
      --progress-color: #e50000;
      --splash-image: none;
    }

    /* Overlay de debug — mettre 'display: block' pour inspecter via chrome://inspect */
    #debug {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,.75);
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 4px;
      z-index: 9999;
      max-width: 500px;
      word-break: break-all;
      display: none; /* mettre 'block' pour debug */
    }
  </style>
</head>
<body>

  <cast-media-player></cast-media-player>
  <div id="debug"></div>

  <!-- Logique receiver : DRM Nagra (nv-authorizations) via Network API CAFv3 -->
  <script src="receiver.js"></script>

</body>
</html>
